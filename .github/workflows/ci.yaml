name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout/@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Nodejs Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installation dependencies
        run: |
          pnpm install --frozen-lockfile
          echo "Installing successfully"

      - name: Build
        run: |
          pnpm build
          echo "Building sucessfully"
